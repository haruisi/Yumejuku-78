<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 7・8 英熟語4択クイズ</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --ink: #182033;
      --muted: #667085;
      --line: #dde3ee;
      --accent: #2563eb;
      --accent-soft: #e8f0ff;
      --ok: #16a34a;
      --ok-soft: #eaf7ee;
      --bad: #dc2626;
      --bad-soft: #fff0f0;
      --shadow: 0 16px 36px rgba(24, 32, 51, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    .app {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 18px 14px 32px;
    }

    header {
      background: linear-gradient(135deg, #ffffff, #edf4ff);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      margin: 0;
    }

    .bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 13px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.15s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: scale(0.98); }
    button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.ghost { color: var(--muted); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 11px 10px;
      text-align: center;
    }

    .stat b { display: block; font-size: 18px; }
    .stat span { color: var(--muted); font-size: 11px; }

    .quiz {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 800;
    }

    .question {
      padding: 22px 18px 16px;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .ja {
      font-size: clamp(25px, 6vw, 42px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin: 0;
    }

    .choices {
      display: grid;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .choice {
      width: 100%;
      text-align: left;
      border-radius: 18px;
      padding: 15px 15px;
      font-size: 17px;
      line-height: 1.35;
      font-weight: 800;
      background: #fff;
      border: 2px solid var(--line);
      white-space: normal;
    }

    .choice small {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #eef2f7;
      color: var(--muted);
      margin-right: 8px;
      font-size: 13px;
    }

    .choice.correct {
      border-color: var(--ok);
      background: var(--ok-soft);
      color: #126334;
    }

    .choice.wrong {
      border-color: var(--bad);
      background: var(--bad-soft);
      color: #991b1b;
    }

    .answerBox {
      margin: 0 16px 16px;
      padding: 14px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid var(--line);
      display: none;
    }

    .answerBox.show { display: block; }
    .answerBox .mini { color: var(--muted); font-size: 12px; font-weight: 800; margin-bottom: 6px; }
    .answerBox .ans { font-size: 20px; font-weight: 900; line-height: 1.35; }

    .footer {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      padding: 0 16px 18px;
    }

    .footer button { flex: 1; }

    .meter {
      height: 8px;
      background: #e9edf5;
      overflow: hidden;
    }

    .meter > div {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s ease;
    }

    .mistakes {
      margin-top: 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      display: none;
    }

    .mistakes.show { display: block; }
    .mistakes h2 { font-size: 17px; margin: 0 0 10px; }
    .mistakeItem {
      border-top: 1px solid var(--line);
      padding: 10px 0;
      font-size: 14px;
      line-height: 1.5;
    }
    .mistakeItem:first-of-type { border-top: none; }
    .mistakeItem b { display: block; font-size: 15px; }
    .mistakeItem span { color: var(--muted); }

    @media (max-width: 560px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      header { border-radius: 18px; }
      .quiz { border-radius: 20px; }
      .choice { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Unit 7・8 英熟語 4択クイズ</h1>
      <p class="sub">日本語の意味を見て、正しい英語表現を選びます。誤答候補は、語数・前置詞・先頭語・スペルの近さを見て、形が似ているものを優先して出します。</p>
      <div class="bar">
        <button id="allBtn" class="active" onclick="setUnit('all')">全部</button>
        <button id="u7Btn" onclick="setUnit('Unit 7')">Unit 7</button>
        <button id="u8Btn" onclick="setUnit('Unit 8')">Unit 8</button>
        <button class="ghost" onclick="restart()">シャッフル</button>
        <button class="ghost" onclick="toggleMistakes()">ミス一覧</button>
      </div>
    </header>

    <section class="stats">
      <div class="stat"><b id="score">0</b><span>正解</span></div>
      <div class="stat"><b id="miss">0</b><span>ミス</span></div>
      <div class="stat"><b id="rate">0%</b><span>正答率</span></div>
      <div class="stat"><b id="streak">0</b><span>連続正解</span></div>
    </section>

    <section class="quiz">
      <div class="meter"><div id="meter"></div></div>
      <div class="topline">
        <span id="progress">1 / 160</span>
        <span class="pill" id="unitTag">Unit 7</span>
      </div>
      <div class="question">
        <div class="label">この意味に合う英語表現は？</div>
        <p class="ja" id="questionText"></p>
      </div>
      <div class="choices" id="choices"></div>
      <div class="answerBox" id="answerBox">
        <div class="mini">正解</div>
        <div class="ans" id="answerText"></div>
      </div>
      <div class="footer">
        <button onclick="speakCurrent()">発音</button>
        <button class="primary" onclick="nextQuestion()">次へ</button>
      </div>
    </section>

    <section class="mistakes" id="mistakeBox">
      <h2>ミス一覧</h2>
      <div id="mistakeList">まだミスはありません。</div>
    </section>
  </main>

    let currentUnit = 'all';
    let deck = [];
    let current = null;
    let currentChoices = [];
    let index = 0;
    let score = 0;
    let miss = 0;
    let streak = 0;
    let answered = false;
    let mistakes = [];

    const letters = ['A', 'B', 'C', 'D'];

    function escapeHTML(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showText(str) {
      return escapeHTML(str).replaceAll('\n', '<br>');
    }

    function normalize(str) {
      return String(str)
        .toLowerCase()
        .replace(/\[[^\]]*\]/g, '')
        .replace(/\n/g, ' ')
        .replace(/[^a-z0-9 ]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function makeChoices(item) {
      const choices = [{ en: item.en, correct: true }];
      const seen = new Set([normalize(item.en)]);
      for (const w of item.wrong) {
        const key = normalize(w);
        if (!key || seen.has(key)) continue;
        choices.push({ en: w, correct: false });
        seen.add(key);
        if (choices.length === 4) break;
      }
      while (choices.length < 4) {
        const base = item.en.split('\n')[0];
        const fallback = choices.length === 1 ? base + ' to' : choices.length === 2 ? base + ' of' : base + ' with';
        choices.push({ en: fallback, correct: false });
      }
      return shuffle(choices);
    }

    function setUnit(unit) {
      currentUnit = unit;
      document.getElementById('allBtn').classList.toggle('active', unit === 'all');
      document.getElementById('u7Btn').classList.toggle('active', unit === 'Unit 7');
      document.getElementById('u8Btn').classList.toggle('active', unit === 'Unit 8');
      restart();
    }

    function restart() {
      const pool = currentUnit === 'all' ? DATA : DATA.filter(x => x.unit === currentUnit);
      deck = shuffle(pool);
      index = 0;
      score = 0;
      miss = 0;
      streak = 0;
      answered = false;
      mistakes = [];
      renderMistakes();
      render();
    }

    function render() {
      if (index >= deck.length) {
        document.getElementById('questionText').textContent = '完了です';
        document.getElementById('choices').innerHTML = '';
        document.getElementById('answerBox').classList.add('show');
        document.getElementById('answerText').textContent = `正解 ${score} / ${deck.length}　ミス ${miss}`;
        document.getElementById('meter').style.width = '100%';
        updateStats();
        return;
      }

      current = deck[index];
      currentChoices = makeChoices(current);
      answered = false;

      document.getElementById('questionText').textContent = current.ja;
      document.getElementById('unitTag').textContent = current.unit;
      document.getElementById('progress').textContent = `${index + 1} / ${deck.length}`;
      document.getElementById('meter').style.width = `${(index / deck.length) * 100}%`;
      document.getElementById('answerBox').classList.remove('show');
      document.getElementById('answerText').innerHTML = '';

      const choicesHTML = currentChoices.map((choice, i) => `
        <button class="choice" onclick="choose(${i})">
          <small>${letters[i]}</small>${showText(choice.en)}
        </button>
      `).join('');
      document.getElementById('choices').innerHTML = choicesHTML;
      updateStats();
    }

    function choose(i) {
      if (answered) return;
      answered = true;
      const buttons = [...document.querySelectorAll('.choice')];
      const chosen = currentChoices[i];
      const correctIndex = currentChoices.findIndex(x => x.correct);
      buttons[correctIndex].classList.add('correct');
      if (chosen.correct) { score++; streak++; }
      else {
        miss++; streak = 0; buttons[i].classList.add('wrong');
        mistakes.push({ ja: current.ja, en: current.en, chosen: chosen.en, unit: current.unit });
        renderMistakes();
      }
      document.getElementById('answerText').innerHTML = showText(current.en);
      document.getElementById('answerBox').classList.add('show');
      updateStats();
    }

    function nextQuestion() {
      if (index >= deck.length) { restart(); return; }
      index++;
      render();
    }

    function updateStats() {
      const answeredCount = score + miss;
      const rate = answeredCount ? Math.round((score / answeredCount) * 100) : 0;
      document.getElementById('score').textContent = score;
      document.getElementById('miss').textContent = miss;
      document.getElementById('rate').textContent = rate + '%';
      document.getElementById('streak').textContent = streak;
    }

    function toggleMistakes() { document.getElementById('mistakeBox').classList.toggle('show'); }

    function renderMistakes() {
      const box = document.getElementById('mistakeList');
      if (!mistakes.length) { box.textContent = 'まだミスはありません。'; return; }
      box.innerHTML = mistakes.map(m => `
        <div class="mistakeItem">
          <b>${escapeHTML(m.ja)} <span>(${escapeHTML(m.unit)})</span></b>
          <div>正解：${showText(m.en)}</div>
          <div><span>選んだもの：${showText(m.chosen)}</span></div>
        </div>
      `).join('');
    }

    function speakCurrent() {
      if (!current) return;
      const text = current.en.split('\n')[0];
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 0.9;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }

    restart();
  </script>
