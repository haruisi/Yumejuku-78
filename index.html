<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Unit 7・8 英熟語4択クイズ iPad固定版</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #172033;
      --muted: #657084;
      --line: #dce3ef;
      --accent: #2563eb;
      --accent2: #eef4ff;
      --ok: #15803d;
      --ok-bg: #e9f8ef;
      --bad: #b91c1c;
      --bad-bg: #fff0f0;
      --shadow: 0 18px 42px rgba(23,32,51,.12);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at top left, #ffffff 0, #f5f7fb 40%, #eef3fb 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }
    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .app {
      width: min(1100px, 100vw);
      height: 100dvh;
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      min-height: 0;
    }
    .top {
      display: grid;
      grid-template-columns: 1.2fr auto auto;
      align-items: center;
      gap: 10px;
      min-height: 54px;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }
    .brand b { font-size: clamp(18px, 2.2vw, 25px); letter-spacing: -0.03em; }
    .brand span { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .chips, .scoreline { display: flex; align-items: center; gap: 7px; flex-wrap: nowrap; }
    .chip, .smallBtn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      padding: 8px 11px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .smallBtn { color: var(--muted); }
    .scoreline {
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
    }
    .scoreline strong { color: var(--ink); margin-left: 3px; }
    .card {
      min-height: 0;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: 8px auto minmax(0, 1fr) 94px 68px;
    }
    .meter { background: #e8edf5; }
    .meter > div { height: 100%; width: 0%; background: var(--accent); transition: width .18s ease; }
    .questionArea {
      padding: clamp(16px, 2.2vh, 24px) clamp(22px, 3vw, 34px) clamp(10px, 1.5vh, 16px);
      border-bottom: 1px solid var(--line);
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .unitTag {
      background: var(--accent2);
      color: var(--accent);
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 13px;
    }
    .question {
      margin: 0;
      font-size: clamp(31px, 5.2vw, 58px);
      line-height: 1.08;
      font-weight: 950;
      letter-spacing: -0.04em;
    }
    .choices {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: clamp(10px, 1.6vw, 16px);
      padding: clamp(12px, 2vh, 20px) clamp(18px, 2.5vw, 30px);
    }
    .choice {
      width: 100%;
      min-height: 0;
      border: 2px solid var(--line);
      border-radius: 22px;
      background: #fff;
      color: var(--ink);
      display: grid;
      grid-template-columns: 38px 1fr;
      align-items: center;
      gap: 10px;
      text-align: left;
      padding: 12px 16px;
      font-size: clamp(18px, 2.2vw, 28px);
      line-height: 1.18;
      font-weight: 900;
      word-break: keep-all;
      overflow: hidden;
    }
    .choice:active { transform: scale(.992); }
    .choice .letter {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #eef2f7;
      color: var(--muted);
      font-size: 15px;
      font-weight: 950;
      align-self: center;
    }
    .choice.correct { border-color: var(--ok); background: var(--ok-bg); color: #14532d; }
    .choice.wrong { border-color: var(--bad); background: var(--bad-bg); color: #7f1d1d; }
    .choice.locked { pointer-events: none; }
    .result {
      margin: 0 clamp(18px, 2.5vw, 30px) 12px;
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: 20px;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      min-height: 82px;
    }
    .resultMark {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: #edf2f7;
      color: var(--muted);
      font-size: 18px;
      font-weight: 950;
    }
    .result.ok .resultMark { background: var(--ok-bg); color: var(--ok); }
    .result.bad .resultMark { background: var(--bad-bg); color: var(--bad); }
    .resultText { min-width: 0; }
    .resultText .label { color: var(--muted); font-size: 12px; font-weight: 900; margin-bottom: 3px; }
    .resultText .answer { font-size: clamp(19px, 2.3vw, 27px); line-height: 1.18; font-weight: 950; }
    .bottom {
      border-top: 1px solid var(--line);
      padding: 10px clamp(18px, 2.5vw, 30px);
      display: grid;
      grid-template-columns: 1fr 1fr 1.6fr;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,.84);
    }
    .bottom button {
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      color: var(--ink);
      font-size: 16px;
      font-weight: 900;
    }
    .bottom .next {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-size: 18px;
    }
    .bottom .next:disabled {
      background: #d8e0ec;
      border-color: #d8e0ec;
      color: #7a8799;
    }
    @media (orientation: portrait) {
      .top { grid-template-columns: 1fr; gap: 7px; }
      .chips, .scoreline { justify-content: center; }
      .brand { justify-content: center; }
      .card { grid-template-rows: 8px auto minmax(0, 1fr) 98px 70px; }
      .question { font-size: clamp(34px, 7vw, 66px); }
      .choice { font-size: clamp(20px, 3.1vw, 31px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <div class="brand"><b>Unit 7・8 英熟語</b><span>iPad固定版</span></div>
      <div class="chips">
        <button class="chip active" id="allBtn" onclick="setUnit('all')">全部</button>
        <button class="chip" id="u7Btn" onclick="setUnit('Unit 7')">Unit 7</button>
        <button class="chip" id="u8Btn" onclick="setUnit('Unit 8')">Unit 8</button>
        <button class="smallBtn" onclick="restart()">シャッフル</button>
      </div>
      <div class="scoreline"><span id="progress">1/160</span><span>正<strong id="score">0</strong></span><span>誤<strong id="miss">0</strong></span><span><strong id="rate">0%</strong></span></div>
    </section>

    <section class="card">
      <div class="meter"><div id="meter"></div></div>
      <div class="questionArea">
        <div class="meta"><span>この意味に合う英語表現は？</span><span class="unitTag" id="unitTag">Unit 7</span></div>
        <p class="question" id="questionText"></p>
      </div>
      <div class="choices" id="choices"></div>
      <div class="result" id="resultBox">
        <div class="resultMark" id="resultMark">?</div>
        <div class="resultText">
          <div class="label" id="resultLabel">選ぶとここに答えが出ます</div>
          <div class="answer" id="answerText">&nbsp;</div>
        </div>
      </div>
      <div class="bottom">
        <button onclick="speakCurrent()">発音</button>
        <button onclick="revealAnswer()">答え</button>
        <button class="next" id="nextBtn" onclick="nextQuestion()" disabled>次へ</button>
      </div>
    </section>
  </main>

    let currentUnit = 'all';
    let deck = [];
    let index = 0;
    let current = null;
    let choices = [];
    let answered = false;
    let score = 0;
    let miss = 0;
    let revealedOnly = false;
    const letters = ['A','B','C','D'];

    function escapeHTML(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
    function showText(str) { return escapeHTML(str).replaceAll('\n', '<br>'); }
    function norm(str) {
      return String(str).toLowerCase().replace(/\[[^\]]*\]/g,'').replace(/\n/g,' ')
        .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
    }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function makeChoices(item) {
      const out = [{ text: item.en, correct: true }];
      const seen = new Set([norm(item.en)]);
      for (const w of item.wrong) {
        const key = norm(w);
        if (!key || seen.has(key)) continue;
        out.push({ text: w, correct: false });
        seen.add(key);
      }
      while (out.length < 4) {
        const base = item.en.split('\n')[0];
        const fallback = [base + ' to', base + ' of', base + ' for'][out.length - 1] || base + ' with';
        if (!seen.has(norm(fallback))) out.push({ text: fallback, correct: false });
        seen.add(norm(fallback));
      }
      return shuffle(out.slice(0,4));
    }
    function setUnit(unit) {
      currentUnit = unit;
      document.getElementById('allBtn').classList.toggle('active', unit === 'all');
      document.getElementById('u7Btn').classList.toggle('active', unit === 'Unit 7');
      document.getElementById('u8Btn').classList.toggle('active', unit === 'Unit 8');
      restart();
    }
    function restart() {
      const pool = currentUnit === 'all' ? DATA : DATA.filter(x => x.unit === currentUnit);
      deck = shuffle(pool);
      index = 0; score = 0; miss = 0; answered = false; revealedOnly = false;
      render();
    }
    function render() {
      if (index >= deck.length) return renderDone();
      current = deck[index];
      choices = makeChoices(current);
      answered = false;
      revealedOnly = false;
      document.getElementById('questionText').textContent = current.ja;
      document.getElementById('unitTag').textContent = current.unit;
      document.getElementById('progress').textContent = `${index + 1}/${deck.length}`;
      document.getElementById('meter').style.width = `${(index / deck.length) * 100}%`;
      document.getElementById('resultBox').className = 'result';
      document.getElementById('resultMark').textContent = '?';
      document.getElementById('resultLabel').textContent = '選ぶとここに答えが出ます';
      document.getElementById('answerText').innerHTML = '&nbsp;';
      document.getElementById('nextBtn').disabled = true;
      document.getElementById('choices').innerHTML = choices.map((c, i) => `
        <button class="choice" onclick="choose(${i})">
          <span class="letter">${letters[i]}</span>
          <span>${showText(c.text)}</span>
        </button>
      `).join('');
      updateScore();
    }
    function choose(i) {
      if (answered) return;
      answered = true;
      const picked = choices[i];
      const buttons = [...document.querySelectorAll('.choice')];
      const correctIndex = choices.findIndex(x => x.correct);
      buttons.forEach(b => b.classList.add('locked'));
      buttons[correctIndex].classList.add('correct');
      if (picked.correct) {
        score++;
        showResult(true, '正解');
      } else {
        miss++;
        buttons[i].classList.add('wrong');
        showResult(false, '不正解');
      }
      document.getElementById('nextBtn').disabled = false;
      updateScore();
    }
    function showResult(ok, label) {
      const box = document.getElementById('resultBox');
      box.className = 'result ' + (ok ? 'ok' : 'bad');
      document.getElementById('resultMark').textContent = ok ? '○' : '×';
      document.getElementById('resultLabel').textContent = label + '：正答';
      document.getElementById('answerText').innerHTML = showText(current.en);
    }
    function revealAnswer() {
      if (!current || answered) return;
      answered = true;
      revealedOnly = true;
      const buttons = [...document.querySelectorAll('.choice')];
      const correctIndex = choices.findIndex(x => x.correct);
      buttons.forEach(b => b.classList.add('locked'));
      buttons[correctIndex].classList.add('correct');
      showResult(true, '答え表示');
      document.getElementById('nextBtn').disabled = false;
    }
    function nextQuestion() {
      if (index >= deck.length) { restart(); return; }
      if (!answered) return;
      index++;
      render();
    }
    function renderDone() {
      document.getElementById('meter').style.width = '100%';
      document.getElementById('progress').textContent = `${deck.length}/${deck.length}`;
      document.getElementById('unitTag').textContent = '完了';
      document.getElementById('questionText').textContent = '完了です';
      document.getElementById('choices').innerHTML = '';
      document.getElementById('resultBox').className = 'result ok';
      document.getElementById('resultMark').textContent = '✓';
      document.getElementById('resultLabel').textContent = '結果';
      document.getElementById('answerText').innerHTML = `正解 ${score} / ${deck.length}　誤答 ${miss}`;
      document.getElementById('nextBtn').disabled = false;
      document.getElementById('nextBtn').textContent = 'もう一周';
      answered = true;
      updateScore();
    }
    function updateScore() {
      const total = score + miss;
      document.getElementById('score').textContent = score;
      document.getElementById('miss').textContent = miss;
      document.getElementById('rate').textContent = total ? Math.round(score / total * 100) + '%' : '0%';
      if (index < deck.length) document.getElementById('nextBtn').textContent = '次へ';
    }
    function speakCurrent() {
      if (!current || !window.speechSynthesis) return;
      const text = current.en.split('\n')[0].replace(/\[[^\]]*\]/g, '').replace(/[〜？]/g, '');
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 0.88;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }
    restart();
  </script>
